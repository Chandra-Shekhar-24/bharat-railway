version: "3.9"

services:
  bharat-railway-postgres:
    image: postgres:16
    container_name: bharat-railway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${HOST_IP}:${POSTGRES_HOST_PORT}:5432"
    volumes:
      - ../bharat-railway-postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
    networks:
      - ${DOCKER_NETWORK}

  bharat-railway-pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: bharat-railway-pgbouncer
    restart: unless-stopped
    environment:
      PGBOUNCER_DATABASE: ${POSTGRES_DB}
      POSTGRESQL_USERNAME: ${POSTGRES_USER}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_HOST: bharat-railway-postgres
      POSTGRESQL_PORT: 5432
    ports:
      - "${HOST_IP}:${PGBOUNCER_HOST_PORT}:6432"
    depends_on:
      - bharat-railway-postgres
    networks:
      - ${DOCKER_NETWORK}

  bharat-railway-valkey:
    image: valkey/valkey:latest
    container_name: bharat-railway-valkey
    restart: unless-stopped
    command: valkey-server --requirepass ${VALKEY_PASSWORD}
    ports:
      - "${HOST_IP}:${VALKEY_HOST_PORT}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      retries: 5
      start_period: 20s
    networks:
      - ${DOCKER_NETWORK}

  bharat-railway-kafka:
    image: bitnami/kafka:latest
    container_name: bharat-railway-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@bharat-railway-kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:${KAFKA_EXTERNAL_HOST_PORT},CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://bharat-railway-kafka:9092,EXTERNAL://${HOST_IP}:${KAFKA_EXTERNAL_HOST_PORT}
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
    ports:
      - "${HOST_IP}:${KAFKA_HOST_PORT}:9092"
      - "${HOST_IP}:${KAFKA_EXTERNAL_HOST_PORT}:${KAFKA_EXTERNAL_HOST_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      retries: 5
      start_period: 40s
    networks:
      - ${DOCKER_NETWORK}

  bharat-railway-minio:
    image: minio/minio:latest
    container_name: bharat-railway-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${HOST_IP}:${MINIO_API_HOST_PORT}:9000"
      - "${HOST_IP}:${MINIO_CONSOLE_HOST_PORT}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5
      start_period: 20s
    networks:
      - ${DOCKER_NETWORK}

  bharat-railway-prometheus:
    image: prom/prometheus:latest
    container_name: bharat-railway-prometheus
    restart: unless-stopped
    volumes:
      - ../bharat-railway-prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - ${DOCKER_NETWORK}

  bharat-railway-loki:
    image: grafana/loki:latest
    container_name: bharat-railway-loki
    restart: unless-stopped
    volumes:
      - ../bharat-railway-loki/loki-config.yml:/etc/loki/loki-config.yml
    networks:
      - ${DOCKER_NETWORK}

  bharat-railway-promtail:
    image: grafana/promtail:latest
    container_name: bharat-railway-promtail
    restart: unless-stopped
    volumes:
      - ../bharat-railway-promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - app-logs:/var/log/app
    networks:
      - ${DOCKER_NETWORK}

  bharat-railway-grafana:
    image: grafana/grafana:latest
    container_name: bharat-railway-grafana
    restart: unless-stopped
    ports:
      - "${HOST_IP}:${GRAFANA_HOST_PORT}:3000"
    networks:
      - ${DOCKER_NETWORK}

  bharat-railway-backend:
    image: eclipse-temurin:21-jre
    container_name: bharat-railway-backend
    restart: unless-stopped
    command: ["tail", "-f", "/dev/null"]
    depends_on:
      bharat-railway-postgres:
        condition: service_healthy
      bharat-railway-valkey:
        condition: service_healthy
      bharat-railway-kafka:
        condition: service_healthy
      bharat-railway-minio:
        condition: service_healthy
    volumes:
      - app-logs:/var/log/app
    networks:
      - ${DOCKER_NETWORK}

  bharat-railway-nginx:
    image: nginx:latest
    container_name: bharat-railway-nginx
    restart: unless-stopped
    ports:
      - "${HOST_IP}:${NGINX_HTTP_HOST_PORT}:80"
      - "${HOST_IP}:${NGINX_HTTPS_HOST_PORT}:443"
    depends_on:
      - bharat-railway-backend
    networks:
      - ${DOCKER_NETWORK}

  bharat-railway-certbot:
    image: certbot/certbot:latest
    container_name: bharat-railway-certbot
    restart: "no"
    depends_on:
      - bharat-railway-nginx
    networks:
      - ${DOCKER_NETWORK}

volumes:
  app-logs:

networks:
  bharat-railway-net:
    name: ${DOCKER_NETWORK}
    driver: bridge