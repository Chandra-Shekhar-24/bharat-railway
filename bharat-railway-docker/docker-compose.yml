# current file version: 1.0.12
# version 1.0.0: Initial Docker Compose orchestration for Bharat Railway Booking System.
# version 1.0.1: Update backend image to eclipse-temurin:21-jre (Java 21 per v5.1 spec).
# version 1.0.2: Add health checks, backend command placeholder, shared log volumes, and Kafka external listener.
# version 1.0.3: Replace hardcoded Kafka IP and external port with environment variables.
# version 1.0.4: Convert header to YAML comments for Docker Compose compatibility.
# version 1.0.5: Fix Kafka image tag from latest to 3.9.
# version 1.0.6: Fix PgBouncer image tag from latest to 1.24.
# version 1.0.7: Replace Bitnami Kafka with Confluent Kafka (free image), update env format.
# version 1.0.8: Replace Bitnami PgBouncer with edoburu/pgbouncer (free image), update env format.
# version 1.0.9 - Fixed network configuration
# version 1.0.10: Update volume mapping from init.sql to create-schemas.sql.
# version 1.0.11: Update volume mount to entire bharat-railway-postgres directory for schema scripts.
# version 1.0.12: Mount pgbouncer.ini and userlist.txt for TCP listener fix.
services:
  bharat-railway-postgres:
    image: postgres:16
    container_name: bharat-railway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${HOST_IP}:${POSTGRES_HOST_PORT}:5432"
    volumes:
      - ../bharat-railway-postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
    networks:
      - bharat-railway-net

  bharat-railway-pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: bharat-railway-pgbouncer
    restart: unless-stopped
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: bharat-railway-postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
    ports:
      - "${HOST_IP}:${PGBOUNCER_HOST_PORT}:6432"
    volumes:
      - ../bharat-railway-pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ../bharat-railway-pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt
    depends_on:
      - bharat-railway-postgres
    networks:
      - bharat-railway-net

  bharat-railway-valkey:
    image: valkey/valkey:latest
    container_name: bharat-railway-valkey
    restart: unless-stopped
    command: valkey-server --requirepass ${VALKEY_PASSWORD}
    ports:
      - "${HOST_IP}:${VALKEY_HOST_PORT}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      retries: 5
      start_period: 20s
    networks:
      - bharat-railway-net

  bharat-railway-kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: bharat-railway-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@bharat-railway-kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:${KAFKA_EXTERNAL_HOST_PORT},CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://bharat-railway-kafka:9092,EXTERNAL://${HOST_IP}:${KAFKA_EXTERNAL_HOST_PORT}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: bharat-railway-kafka-cluster
    ports:
      - "${HOST_IP}:${KAFKA_HOST_PORT}:9092"
      - "${HOST_IP}:${KAFKA_EXTERNAL_HOST_PORT}:${KAFKA_EXTERNAL_HOST_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      retries: 5
      start_period: 40s
    networks:
      - bharat-railway-net

  bharat-railway-minio:
    image: minio/minio:latest
    container_name: bharat-railway-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${HOST_IP}:${MINIO_API_HOST_PORT}:9000"
      - "${HOST_IP}:${MINIO_CONSOLE_HOST_PORT}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5
      start_period: 20s
    networks:
      - bharat-railway-net

  bharat-railway-prometheus:
    image: prom/prometheus:latest
    container_name: bharat-railway-prometheus
    restart: unless-stopped
    volumes:
      - ../bharat-railway-prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - bharat-railway-net

  bharat-railway-loki:
    image: grafana/loki:latest
    container_name: bharat-railway-loki
    restart: unless-stopped
    volumes:
      - ../bharat-railway-loki/loki-config.yml:/etc/loki/loki-config.yml
    networks:
      - bharat-railway-net

  bharat-railway-promtail:
    image: grafana/promtail:latest
    container_name: bharat-railway-promtail
    restart: unless-stopped
    volumes:
      - ../bharat-railway-promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - app-logs:/var/log/app
    networks:
      - bharat-railway-net

  bharat-railway-grafana:
    image: grafana/grafana:latest
    container_name: bharat-railway-grafana
    restart: unless-stopped
    ports:
      - "${HOST_IP}:${GRAFANA_HOST_PORT}:3000"
    networks:
      - bharat-railway-net

  bharat-railway-backend:
    image: eclipse-temurin:21-jre
    container_name: bharat-railway-backend
    restart: unless-stopped
    command: ["tail", "-f", "/dev/null"]
    depends_on:
      bharat-railway-postgres:
        condition: service_healthy
      bharat-railway-valkey:
        condition: service_healthy
      bharat-railway-kafka:
        condition: service_healthy
      bharat-railway-minio:
        condition: service_healthy
    volumes:
      - app-logs:/var/log/app
    networks:
      - bharat-railway-net

  bharat-railway-nginx:
    image: nginx:latest
    container_name: bharat-railway-nginx
    restart: unless-stopped
    ports:
      - "${HOST_IP}:${NGINX_HTTP_HOST_PORT}:80"
      - "${HOST_IP}:${NGINX_HTTPS_HOST_PORT}:443"
    depends_on:
      - bharat-railway-backend
    networks:
      - bharat-railway-net

  bharat-railway-certbot:
    image: certbot/certbot:latest
    container_name: bharat-railway-certbot
    restart: "no"
    depends_on:
      - bharat-railway-nginx
    networks:
      - bharat-railway-net

volumes:
  app-logs:

networks:
  bharat-railway-net:
    driver: bridge